<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini App</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Привет, <span id="username"></span>!</h1>
    <button id="main-btn">Закрыть приложение</button>

    <script>
        let tg = window.Telegram.WebApp; // Инициализация
        tg.expand(); // Развернуть на весь экран

        // Берем имя пользователя прямо из Telegram
        document.getElementById("username").innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Гость";

        // Обработка клика
        document.getElementById("main-btn").addEventListener("click", function(){
            tg.close(); // Закрыть Mini App
        });
    </script>
</body>
</html>
